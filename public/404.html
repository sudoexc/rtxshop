<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 — RTXSHOP</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('rtx_theme')||'light')</script>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 24px;
      background: var(--bg-primary);
    }
    .e404-code {
      font-size: clamp(100px,20vw,180px);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, #00c6ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .e404-title { font-size: 28px; font-weight: 700; color: var(--text-primary); }
    .e404-sub   { font-size: 16px; color: var(--text-muted); max-width: 400px; }
    .e404-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="page-404">
    <div class="e404-code">404</div>
    <h1 class="e404-title">Страница не найдена</h1>
    <p class="e404-sub">Похоже, эта страница переехала или её никогда не существовало</p>
    <div class="e404-actions">
      <a href="/" class="btn-primary">На главную</a>
      <a href="/#contact" class="btn-secondary">Связаться с нами</a>
    </div>
  </div>
</body>
</html>
